<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Placement Portal - Agile Product Simulation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#eef2f7;
}

header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    margin-bottom:10px;
}

.container{
    width:90%;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:25px;
}

section{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

section h2{
    color:#0d6efd;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    background:#084298;
}

.company{

background:#f8f9fa;
border-left:6px solid #0d6efd;
padding:18px;
border-radius:10px;
margin-bottom:18px;
transition:.3s;

}

.company:hover{

transform:translateY(-5px);
box-shadow:0 6px 15px rgba(0,0,0,.15);

}

.company h3{

color:#0d6efd;
margin-bottom:10px;

}

.company p{

margin:6px 0;

}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

table th{
    background:#0d6efd;
    color:white;
    padding:10px;
}

table td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

#loginMessage{
    margin-top:15px;
    font-weight:bold;
    text-align:center;
    font-size:16px;
}

footer{
    text-align:center;
    margin:30px;
    color:#555;
}

@media(max-width:768px){
.container{
grid-template-columns:1fr;
}
}
</style>

</head>
<body>

<header>

<h1>Campus Placement Portal</h1>

<p>Mini Project - Agile Product Simulation (MVP)</p>

</header>

<div class="container">

<!-- Student Registration -->

<!-- Student Registration -->

<section>

<h2>Student Registration</h2>

<form id="studentForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="College Email" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<input type="text" id="college" placeholder="College Name" required>

<input type="text" id="branch" placeholder="Branch" required>

<input type="number" id="cgpa" step="0.01" min="0" max="10" placeholder="CGPA" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

</section>
<!-- Student Login -->

<section>

<h2>Student Login</h2>

<form id="loginForm">

<input type="email" id="loginEmail" placeholder="College Email" required>

<input type="password" id="loginPassword" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p id="loginMessage"></p>

</section>

<!-- Company List -->

<section>

<h2>Available Companies</h2>

<button onclick="alert('Showing All Companies')">
View Companies
</button>

<div id="companyList"></div>

</section>
<section>

<h2>Application Status</h2>

<p id="status">No Application Yet</p>

</section>

<!-- Registered Students -->

<section style="grid-column:1/-1;">

<h2>Registered Students</h2>

<table>

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Branch</th>

<th>Status</th>

</tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

</section>

</div>

<footer>

<h3>Agile Product Simulation Project</h3>

<p>Developed using HTML, CSS & JavaScript</p>

</footer>

<script>

// Company Data

const companies = [

{
name:"Google",
role:"Software Engineer",
package:"₹18 LPA",
location:"Bangalore",
cgpa:"8.0",
deadline:"30 June"
},

{
name:"Microsoft",
role:"Backend Developer",
package:"₹16 LPA",
location:"Hyderabad",
cgpa:"7.5",
deadline:"2 July"
},

{
name:"Amazon",
role:"Cloud Engineer",
package:"₹15 LPA",
location:"Chennai",
cgpa:"7.0",
deadline:"5 July"
},

{
name:"Infosys",
role:"System Engineer",
package:"₹5.5 LPA",
location:"Bhubaneswar",
cgpa:"6.5",
deadline:"8 July"
},

{
name:"TCS",
role:"Graduate Trainee",
package:"₹4 LPA",
location:"Kolkata",
cgpa:"6.0",
deadline:"10 July"
}

];

// Display Companies

const companyList=document.getElementById("companyList");

companies.forEach(company=>{

companyList.innerHTML+=`

<div class="company">

<h3>${company.name}</h3>

<p><strong>💼 Role :</strong> ${company.role}</p>

<p><strong>💰 Package :</strong> ${company.package}</p>

<p><strong>📍 Location :</strong> ${company.location}</p>

<p><strong>🎓 Minimum CGPA :</strong> ${company.cgpa}</p>

<p><strong>📅 Last Date :</strong> ${company.deadline}</p>

<button onclick="applyCompany('${company.name}')">

Apply Now

</button>

</div>

`;

});
// Apply Button

function applyCompany(company){

alert("Application Submitted Successfully!");

document.getElementById("status").innerHTML =
"Applied to : " + company;

}

// Student Registration

const students=[];

const form=document.getElementById("studentForm");
const table=document.getElementById("studentTable");

form.addEventListener("submit",function(e){

e.preventDefault();

const student={
name:document.getElementById("name").value,
email:document.getElementById("email").value,
phone:document.getElementById("phone").value,
college:document.getElementById("college").value,
branch:document.getElementById("branch").value,
cgpa:document.getElementById("cgpa").value,
password:document.getElementById("password").value
};

students.push(student);

table.innerHTML+=`
<tr>
<td>${student.name}</td>
<td>${student.email}</td>
<td>${student.branch}</td>
<td style="color:green;"><strong>Registered</strong></td>
</tr>
`;

alert("Registration Successful!");
form.reset();

});

// Student Login

const loginForm=document.getElementById("loginForm");
const loginMessage=document.getElementById("loginMessage");

loginForm.addEventListener("submit",function(e){

e.preventDefault();

const email=document.getElementById("loginEmail").value;
const password=document.getElementById("loginPassword").value;

const student=students.find(s=>s.email===email && s.password===password);

if(student){
loginMessage.style.color="green";
loginMessage.textContent="Login Successful! Welcome "+student.name;
}else{
loginMessage.style.color="red";
loginMessage.textContent="Invalid Email or Password";
}

loginForm.reset();

});


</script>

</body>
</html>
